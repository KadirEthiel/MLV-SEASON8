<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MLV Season 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Oxanium:wght@600;700;800&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --z0:#100714;
  --z1:#190b22;
  --z2:#241033;
  --z3:#35164d;
  --z4:#512071;
  --z5:#7d35aa;
  --z6:#b84dff;
  --z7:#d783ff;
  --z8:#f0c4ff;
  --z9:#ffe1fb;
  --za:#fff4fd;
  --zb:#ffffff;
  --pink0:#ff5db4;
  --pink1:#ff8fd2;
  --pink2:#ffc1e7;
  --lilac0:#b77cff;
  --lilac1:#d9b4ff;
  --violet0:#6f2bd1;
  --roseGlow:rgba(255,93,180,.34);
  --purpleGlow:rgba(184,77,255,.28);
  --line:rgba(255,193,231,.18);
  --line2:rgba(217,180,255,.12);
  --text:#ffeafd;
  --muted:#c997df;
  --muted2:#846097;
  --gold:#ffe36b;
  --red:#ff4f86;
  --green:#5dffd7;
  --ease:cubic-bezier(.22,.68,0,1.2);
  --easio:cubic-bezier(.4,0,.2,1);
  --r1:12px;--r2:18px;--r3:26px;
}
html{overflow-x:hidden}
html,body{min-height:100%;font-family:'Manrope',sans-serif;color:var(--text);background:var(--z0);-webkit-font-smoothing:antialiased}
body{
  padding:12px;
  background:
    radial-gradient(ellipse 80% 60% at 12% -10%,rgba(255,93,180,.30),transparent 62%),
    radial-gradient(ellipse 64% 54% at 98% 4%,rgba(184,77,255,.28),transparent 64%),
    radial-gradient(ellipse 56% 72% at 56% 112%,rgba(217,180,255,.18),transparent 65%),
    linear-gradient(160deg,#100714 0%,#1a0a25 45%,#0c0613 100%);
  overflow-x:hidden;min-height:100vh;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 44px,rgba(255,193,231,.035) 44px,rgba(255,193,231,.035) 45px),
    repeating-linear-gradient(90deg,transparent,transparent 44px,rgba(217,180,255,.035) 44px,rgba(217,180,255,.035) 45px);
  mask-image:radial-gradient(ellipse at 50% 28%,rgba(0,0,0,.66),transparent 72%);
}
body::after{
  content:"";position:fixed;inset:-25%;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle at 20% 15%,rgba(255,93,180,.16),transparent 20%),
    radial-gradient(circle at 82% 20%,rgba(184,77,255,.14),transparent 18%),
    radial-gradient(circle at 64% 76%,rgba(217,180,255,.10),transparent 18%);
  animation:zFloat 14s ease-in-out infinite alternate;will-change:transform;
}
@keyframes zFloat{from{transform:translate3d(-12px,-8px,0)}to{transform:translate3d(12px,10px,0)}}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:rgba(18,6,28,.85);border-radius:99px}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--pink0),var(--z6));border-radius:99px;border:2px solid rgba(18,6,28,.85)}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,var(--pink1),var(--z7))}
*{scrollbar-width:thin;scrollbar-color:var(--pink0) rgba(18,6,28,.85)}
button,input{font-family:'Manrope',sans-serif}
.zs{position:relative;z-index:1;max-width:1500px;margin:0 auto;display:grid;gap:12px}

/* HERO */
.zh-hero{
  position:relative;overflow:hidden;border:1px solid rgba(255,193,231,.30);border-radius:var(--r3);
  background:
    radial-gradient(ellipse 70% 100% at 82% 50%,rgba(184,77,255,.24),transparent),
    radial-gradient(ellipse 44% 64% at 8% 80%,rgba(255,93,180,.20),transparent),
    linear-gradient(135deg,rgba(43,15,61,.96),rgba(19,8,29,.98));
  box-shadow:0 28px 100px rgba(0,0,0,.46),0 0 70px rgba(255,93,180,.10),inset 0 1px 0 rgba(255,255,255,.08);
  padding:20px 24px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;
}
.zh-deco{position:absolute;right:-60px;top:-120px;width:420px;height:420px;border-radius:50%;border:1px solid rgba(255,193,231,.13);box-shadow:inset 0 0 90px rgba(255,93,180,.12);pointer-events:none}
.zh-deco::after{content:"";position:absolute;inset:42px;border-radius:50%;border:1px solid rgba(217,180,255,.10)}
.zh-hex{position:absolute;right:20px;top:12px;opacity:.22;pointer-events:none}
.zk{display:inline-flex;align-items:center;gap:8px;font:700 11px 'Space Mono',monospace;letter-spacing:3px;color:var(--pink2);text-transform:uppercase;margin-bottom:10px;text-shadow:0 0 20px rgba(255,93,180,.58)}
.zk::before{content:"";width:28px;height:2px;background:linear-gradient(90deg,var(--pink1),transparent);border-radius:2px}
.zt{font-family:'Syne',sans-serif;font-size:54px;line-height:.92;letter-spacing:-1px;margin-bottom:10px}
.zt span{background:linear-gradient(110deg,#fff 0%,#ffe1fb 28%,var(--pink1) 52%,var(--lilac0) 78%,#fff 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 42px rgba(255,93,180,.24))}
.zsub{color:var(--muted);font-size:14px;line-height:1.6;font-weight:600;max-width:760px}
.zh-stats{display:flex;flex-direction:column;gap:12px;align-items:flex-end}
.zbadge{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(255,193,231,.22);background:linear-gradient(135deg,rgba(48,15,67,.88),rgba(20,8,30,.90));border-radius:var(--r2);padding:8px 14px;font:700 11px 'Space Mono',monospace;letter-spacing:1px;color:var(--pink2);white-space:nowrap;min-width:130px;box-shadow:0 8px 32px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.06)}
.zbdot{width:8px;height:8px;border-radius:50%;background:var(--pink1);box-shadow:0 0 12px var(--pink1);flex-shrink:0}
.zbadge.zlive .zbdot{background:var(--green);box-shadow:0 0 12px var(--green);animation:zpulse 1.8s ease-in-out infinite}
.zbadge.zlive{color:var(--green);border-color:rgba(93,255,215,.30)}
.zbadge.zerr .zbdot{background:var(--red);box-shadow:0 0 8px var(--red)}
.zbadge.zerr{color:var(--red);border-color:rgba(255,79,134,.30)}
.zbval{font-size:16px;font-family:'Syne',sans-serif;color:var(--zb);line-height:1}
@keyframes zpulse{50%{transform:scale(1.5);opacity:.5}}

/* CONTROLS */
.zctrl{display:grid;grid-template-columns:1fr;gap:8px;padding:12px;background:linear-gradient(180deg,rgba(34,12,48,.84),rgba(18,7,27,.78));border:1px solid var(--line);border-radius:var(--r2);box-shadow:0 16px 60px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.045);backdrop-filter:blur(8px)}
.zinput{width:100%;min-width:0;height:42px;padding:0 14px 0 42px;border:1px solid var(--line);border-radius:var(--r1);background:url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%23ff8fd2' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='7'/%3E%3Cpath d='m20 20-3.5-3.5'/%3E%3C/svg%3E") 14px center/16px 16px no-repeat,rgba(18,6,28,.78);color:var(--text);font-weight:800;font-size:13px;outline:none;transition:border-color .18s,box-shadow .18s;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.zinput::placeholder{color:var(--muted2)}
.zinput:focus{border-color:rgba(255,143,210,.70);box-shadow:0 0 0 3px rgba(255,93,180,.13)}

/* TABLE */
.ztable-wrap{border:1px solid var(--line);border-radius:var(--r3);background:linear-gradient(180deg,rgba(34,12,49,.96),rgba(17,7,27,.98));overflow-x:auto;overflow-y:hidden;box-shadow:0 24px 80px rgba(0,0,0,.30),0 0 70px rgba(184,77,255,.08),inset 0 1px 0 rgba(255,255,255,.05)}
.ztable{display:grid;min-width:900px}
.zrow{display:grid;grid-template-columns:64px minmax(0,1.8fr) minmax(0,.9fr) minmax(0,1.1fr) minmax(0,.9fr) minmax(0,1.2fr) 82px;gap:0;align-items:stretch;min-height:68px;padding:0 12px;border-bottom:1px solid var(--line2);transition:background .16s var(--easio);contain:layout style}
.zrow:not(.zrh):hover{background:linear-gradient(90deg,rgba(255,93,180,.10),rgba(184,77,255,.04))}
.zrow.zrh{min-height:42px;background:linear-gradient(180deg,rgba(49,18,70,.98),rgba(30,11,43,.98));font:700 11px 'Space Mono',monospace;letter-spacing:1.2px;text-transform:uppercase;color:var(--pink2);position:sticky;top:0;z-index:3}
.zrow>span{height:auto;min-height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:7px 10px}
.zrow>span:not(:last-child){border-right:1px solid rgba(255,193,231,.13)}
.zrow.zrh>span:not(:last-child){border-right:1px solid rgba(217,180,255,.09)}
.zrrank{display:flex;align-items:center;justify-content:center}
.zrrank svg{width:42px;height:42px;flex-shrink:0}
.zrplayer{display:grid!important;gap:3px;justify-items:center;text-align:center;padding:8px 12px!important;align-content:center!important;overflow:hidden!important}
.zrplayer b{font-size:17px;font-weight:800;line-height:1.15;color:#fff7fe;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.25px!important}
.zrteam{font:700 10px 'Space Mono',monospace;letter-spacing:.5px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;opacity:.85}
.zrcell{display:flex!important;flex-wrap:wrap!important;gap:6px!important;justify-content:center!important;align-items:center!important;align-content:center!important;text-align:center!important;overflow:visible!important;padding:8px 10px!important;white-space:normal!important;height:auto!important;min-height:46px!important}
.zrtotal{font-family:'Oxanium','Space Mono',monospace!important;font-size:30px!important;font-weight:800!important;color:var(--pink2);letter-spacing:.2px!important;text-shadow:0 0 14px rgba(255,93,180,.22)}
.zrow:nth-child(2) .zrtotal{color:var(--gold);text-shadow:0 0 14px rgba(255,227,107,.30)}
.zrow:nth-child(3) .zrtotal{color:var(--pink1)}
.zrow:nth-child(4) .zrtotal{color:var(--lilac1)}
.zempty,.zloading{padding:44px;text-align:center;color:var(--muted);font:700 13px 'Space Mono',monospace;letter-spacing:.5px}

/* PILLS */
.zpill{--pc1:var(--pink1);--pc2:var(--z6);--pfg:var(--za);--prim:rgba(255,143,210,.32);display:inline-flex;flex-direction:row;align-items:center;justify-content:center;gap:4px;min-height:25px;padding:5px 10px;border-radius:999px;border:1px solid var(--prim);background:linear-gradient(135deg,color-mix(in srgb,var(--pc1) 20%,transparent),color-mix(in srgb,var(--pc2) 15%,transparent)),rgba(0,0,0,.12);color:var(--pfg);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 0 14px color-mix(in srgb,var(--pc2) 22%,transparent);font:800 10.5px 'Space Mono',monospace;letter-spacing:.2px;line-height:1;white-space:nowrap;vertical-align:middle;transition:transform .16s var(--easio)}
.zpill small{display:inline-block;font:700 9px 'Space Mono',monospace;opacity:.72;letter-spacing:.8px;line-height:1}
.zpill.znil{opacity:.32;background:transparent;border-color:rgba(255,193,231,.12);box-shadow:none;color:var(--muted2)}
.zpill.zplibero{--pc1:#ffb8ea;--pc2:#ff4ec2;--pfg:#fff0fb;--prim:rgba(255,78,194,.30)}
.zpill.zpspiker{--pc1:#ff8aa8;--pc2:#ff3f76;--pfg:#fff0f4;--prim:rgba(255,63,118,.30)}
.zpill.zpds{--pc1:#d6b4ff;--pc2:#9b5cff;--pfg:#f6edff;--prim:rgba(155,92,255,.30)}
.zpill.zpsetter{--pc1:#ffcbf0;--pc2:#d36bff;--pfg:#fff1fb;--prim:rgba(211,107,255,.30)}
.zpill.zpchamp{--pc1:#f5d7ff;--pc2:#b84dff;--pfg:#fff5ff;--prim:rgba(184,77,255,.32)}
.zpill.zps1{--pc1:#ffd2ef;--pc2:#ff70c8;--pfg:#fff4fb;--prim:rgba(255,112,200,.30)}
.zpill.zps2{--pc1:#e8c8ff;--pc2:#b84dff;--pfg:#faf0ff;--prim:rgba(184,77,255,.30)}
.zpill.zps3{--pc1:#d6b4ff;--pc2:#8b5cf6;--pfg:#f4ebff;--prim:rgba(139,92,246,.30)}
.zpill.zps4{--pc1:#ffb5dc;--pc2:#ff4f9f;--pfg:#fff0f8;--prim:rgba(255,79,159,.30)}
.zpill.zps5{--pc1:#f4d0ff;--pc2:#c45cff;--pfg:#fbf0ff;--prim:rgba(196,92,255,.30)}
.zpill.zps6{--pc1:#ffd8f2;--pc2:#ff86d6;--pfg:#fff5fb;--prim:rgba(255,134,214,.30)}
.zpill.zpleaguemvp,.zpill.zpmvp{--pc1:#fff29a;--pc2:#ffb800;--pfg:#fff7c7;--prim:rgba(255,184,0,.35)}
.zpill.zpfinalmvp{--pc1:#ffffff;--pc2:#ffc7f0;--pfg:#ffffff;--prim:rgba(255,199,240,.35)}
.zpill.zpsemifinalmvp{--pc1:#ead6ff;--pc2:#a855f7;--pfg:#f7edff;--prim:rgba(168,85,247,.32)}
.zpill.zpmop{--pc1:#ffb88f;--pc2:#ff6a9a;--pfg:#fff0f3;--prim:rgba(255,106,154,.30)}
.zpill.zpmdp{--pc1:#e4ccff;--pc2:#9b5cff;--pfg:#f7f0ff;--prim:rgba(155,92,255,.30)}
.zpill.zppotw{--pc1:#ff9fd8;--pc2:#ff5db4;--pfg:#ffd8f4;--prim:rgba(255,93,180,.34)}
.zpill:hover{transform:scale(1.08)!important;z-index:20!important}
.zqty{display:inline;font:800 10.5px 'Space Mono',monospace;letter-spacing:.2px;line-height:1;vertical-align:middle}
.zqty.zq1{background:linear-gradient(180deg,#fff,#ffd4f0 55%,#bf7aa8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 6px rgba(255,193,231,.5))}
.zqty.zq2{background:linear-gradient(180deg,#fff8ad,#ffe13b 55%,#c89600);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 8px rgba(255,225,59,.4))}
.zqty.zq3{background:linear-gradient(180deg,#ffd6a1,#ff8a24 55%,#bb4500);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 10px rgba(255,138,36,.45))}
.zqty.zq4{background:linear-gradient(180deg,#f0d6ff,#b84dff 52%,#50116d);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 12px rgba(184,77,255,.55))}
.zach{display:inline;color:var(--pfg);font:800 10.5px 'Space Mono',monospace;line-height:1;vertical-align:middle}
.zfooter{text-align:center;font:700 11px 'Space Mono',monospace;letter-spacing:1.5px;color:var(--muted2);padding:10px;opacity:.68}

@media(max-width:900px){
  .zh-hero{grid-template-columns:1fr;padding:18px 16px}
  .zh-stats{flex-direction:row;flex-wrap:wrap;align-items:flex-start;gap:8px}
  .zbadge{min-width:unset}
  .zt{font-size:44px}
}
@media(max-width:760px){
  body{padding:12px}
  .zt{font-size:48px}
  .ztable{min-width:0}
  .zrow{grid-template-columns:58px minmax(0,1fr) 78px!important;min-height:68px!important}
  .zrow>span:nth-child(3),.zrow>span:nth-child(4),.zrow>span:nth-child(5),.zrow>span:nth-child(6){display:none}
  .zrow>span{border-right:0!important}
  .zrtotal{font-size:28px!important}
  .zrplayer b{font-size:14px}
  .zrcell{padding:4px 6px!important}
  .zrrank svg{width:42px;height:42px}
}
</style>
</head>
<body>
<div class="zs">
  <header class="zh-hero">
    <div class="zh-deco"></div>
    <svg class="zh-hex" width="340" height="200" viewBox="0 0 340 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <polygon points="80,10 130,10 155,52 130,94 80,94 55,52" stroke="#ff8fd2" stroke-width="1.4" fill="rgba(255,143,210,.08)"/>
      <polygon points="180,28 230,28 255,70 230,112 180,112 155,70" stroke="#b84dff" stroke-width="1.2" fill="rgba(184,77,255,.07)"/>
      <polygon points="260,5 295,5 312.5,35 295,65 260,65 242.5,35" stroke="#d9b4ff" stroke-width="1" fill="none"/>
      <line x1="130" y1="52" x2="155" y2="70" stroke="#ff8fd2" stroke-width="1" opacity=".5"/>
      <line x1="230" y1="70" x2="260" y2="35" stroke="#b84dff" stroke-width="1" opacity=".4"/>
    </svg>
    <div>
      <div class="zk">MLV Information</div>
      <h1 class="zt"><span>MLV SEASON 8</span></h1>
      <p class="zsub">Everything about MLV Season 8 in one place, including MVP rankings, Player of the Week awards, teams, and total season points.</p>
    </div>
    <div class="zh-stats">
      <div class="zbadge" id="zsync"><div class="zbdot"></div><span>SYNCING</span></div>
      <div class="zbadge"><span class="zbval" id="ztotal">0</span><span>PLAYERS</span></div>
      <div class="zbadge"><span>🌸</span><span>SEASON 8 BOARD</span></div>
    </div>
  </header>

  <section class="zctrl">
    <input class="zinput" id="zsearch" placeholder="Search Season 8 player, team or award…"/>
  </section>

  <main class="ztable-wrap">
    <div class="ztable" id="zmvps8Table"><div class="zloading">Loading Season 8…</div></div>
  </main>

  <footer class="zfooter">Made by Zenoir and Fuas · MLV Season 8 · 2026</footer>
</div>

<script>
const ZAPI_SEASON8 = "https://script.google.com/macros/s/AKfycbyY2ODKeCPXsdsKocUyNkiuF7Xk7eQZBa_E-zg3T5BHotih4llu7lpuv8x6Dg4UvuuBlg/exec";
let ZMVPS8 = [], ZLSIG = "";

const Z$ = id => document.getElementById(id);
const Zcl = v => String(v ?? "").trim();
const Zkey = (r,a) => { for(const n of a) if(r[n] != null && Zcl(r[n])) return r[n]; return ""; };
const Zsrch = p => Object.values(p).join(" ").toLowerCase();

function Zstatus(txt,type){
  const el = Z$("zsync");
  el.innerHTML = "";
  const dot = document.createElement("div"); dot.className = "zbdot";
  const sp = document.createElement("span"); sp.textContent = txt;
  el.appendChild(dot); el.appendChild(sp);
  el.className = "zbadge" + (type ? " z" + type : "");
}

function ZnormMvpS8(r){
  return{
    name:   Zcl(Zkey(r,["name","player","players","Player","Players","PLAYER","PLAYERS"])),
    team:   Zcl(Zkey(r,["team","Team","TEAM"])),
    top1:   Zcl(Zkey(r,["top1","TOP1","Top 1","top 1","TOP 1"])),
    top5:   Zcl(Zkey(r,["top5","TOP5","Top 5","top 5","TOP 5","top+5","TOP+5"])),
    potw:   Zcl(Zkey(r,["potw","POTW","Player of the Week","PLAYER OF THE WEEK"])),
    mvps:   Zcl(Zkey(r,["mvps","MVPs","MVPS","mvp","MVP","awards","Awards"])),
    points: Number(Zkey(r,["points","Points","POINTS","Total","TOTAL","Pts","PTS"]) || 0) || 0
  };
}

function ZreadPayload(raw){
  if(Array.isArray(raw)) return raw;
  return raw.mvpsS8 || raw.mvpS8 || raw.mvps8 || raw.mvp8 || raw["Season 8"] || raw.s8Mvps || raw.s8MVPs || raw.rows || raw.data || [];
}

async function Zsync(){
  try{
    if(!ZAPI_SEASON8 || ZAPI_SEASON8.includes("SEU_LINK")){ Zstatus("ADD SHEET LINK","err"); return; }
    Zstatus("SYNCING");

    const res = await fetch(ZAPI_SEASON8,{method:"GET",cache:"no-store"});
    if(!res.ok) throw new Error("S8 HTTP " + res.status);

    const raw = JSON.parse(await res.text());
    const rows = ZreadPayload(raw).map(ZnormMvpS8).filter(p => p.name);
    const sig = JSON.stringify(rows);

    if(sig !== ZLSIG){
      ZMVPS8 = rows;
      ZLSIG = sig;
      ZrenderAll();
    }
    Zstatus("LIVE DATA","live");
  }catch(err){
    console.error(err);
    Zstatus("SHEET ERROR","err");
    if(!ZMVPS8.length){
      Z$("zmvps8Table").innerHTML = '<div class="zempty">Could not load Season 8 data. Check Apps Script permissions.</div>';
    }
  }
}

function Zesc(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function ZqtyClass(txt){
  const m = Zcl(txt).match(/(\d+)/);
  if(!m) return "";
  const n = +m[1];
  if(n >= 10) return "zq4";
  if(n >= 5) return "zq3";
  if(n >= 3) return "zq2";
  if(n >= 1) return "zq1";
  return "";
}
function ZachClass(txt){
  const t = Zcl(txt).toLowerCase();
  const c = [];
  if(/\bmop\b/i.test(txt)) c.push("zpmop");
  else if(/\bmdp\b/i.test(txt)) c.push("zpmdp");
  else if(/\bmvp\b/i.test(txt)) c.push("zpmvp");
  else if(/\bpotw\b/i.test(txt) || t.includes("player of the week")) c.push("zppotw");

  if(/\bs1\b/i.test(txt)) c.push("zps1");
  else if(/\bs2\b/i.test(txt)) c.push("zps2");
  else if(/\bs3\b/i.test(txt)) c.push("zps3");
  else if(/\bs4\b/i.test(txt)) c.push("zps4");
  else if(/\bs5\b/i.test(txt)) c.push("zps5");
  else if(/\bs6\b/i.test(txt)) c.push("zps6");

  if(t.includes("league mvp")) c.push("zpleaguemvp");
  else if(t.includes("final mvp")) c.push("zpfinalmvp");
  else if(t.includes("semifinal mvp")) c.push("zpsemifinalmvp");
  else if(t.includes("champion") || /\bs[1-6]\b/i.test(txt)) c.push("zpchamp");
  else if(t.includes("libero")) c.push("zplibero");
  else if(t.includes("spiker")) c.push("zpspiker");
  else if(/\bds\b/i.test(txt)) c.push("zpds");
  else if(t.includes("setter")) c.push("zpsetter");
  return c.join(" ");
}
function ZfmtAch(item){
  const s = Zesc(item);
  const m = Zcl(item).match(/^(\d+)\s*[xX]\s*(.+)$/);
  if(!m) return `<span class="zach">${s}</span>`;
  const qty = m[1] + "x";
  const label = m[2].trim();
  return `<span class="zqty ${ZqtyClass(qty)}">${Zesc(qty)}</span><span class="zach">${Zesc(label)}</span>`;
}
function ZpillsHTML(txt){
  const items = Zcl(txt).split(",").map(x => x.trim()).filter(Boolean);
  if(!items.length) return '<span class="zpill znil">—</span>';
  return items.map(item => `<span class="zpill ${ZachClass(item)}">${ZfmtAch(item)}</span>`).join("");
}
function ZsortMvps8(){ return [...ZMVPS8].sort((a,b) => b.points - a.points || a.name.localeCompare(b.name)); }
function ZfiltMvps8(){
  const q = Z$("zsearch").value.toLowerCase().trim();
  return ZsortMvps8().filter(p => !q || Zsrch(p).includes(q));
}
function ZrowHex(n){
  const txt = String(n);
  const fs = txt.length <= 2 ? 20 : txt.length <= 3 ? 15 : 11;
  let fill,stroke,textFill,glow;
  if(n === 1){fill="rgba(255,227,107,.13)";stroke="rgba(255,227,107,.72)";textFill="#ffe36b";glow="rgba(255,227,107,.44)"}
  else if(n === 2){fill="rgba(255,143,210,.13)";stroke="rgba(255,143,210,.62)";textFill="#ffbfe5";glow="rgba(255,93,180,.40)"}
  else if(n === 3){fill="rgba(184,77,255,.13)";stroke="rgba(184,77,255,.64)";textFill="#d9b4ff";glow="rgba(184,77,255,.40)"}
  else{fill="rgba(217,180,255,.08)";stroke="rgba(217,180,255,.28)";textFill="#9b78ac";glow="transparent"}
  return `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 8px ${glow})">
    <polygon points="30,3.5 56.5,17.75 56.5,42.25 30,56.5 3.5,42.25 3.5,17.75" fill="${fill}" stroke="${stroke}" stroke-width="2.2"/>
    <text x="30" y="30" text-anchor="middle" dy=".36em" font-family="Oxanium, Space Mono, monospace" font-size="${fs}" font-weight="800" fill="${textFill}">#${txt}</text>
  </svg>`;
}
function ZrenderMvps8(){
  const rows = ZfiltMvps8();
  const head = `<div class="zrow zrh"><span>Rank</span><span>Player</span><span>Top 1</span><span>Top +5</span><span>POTW</span><span>MVPs</span><span>Points</span></div>`;
  if(!ZMVPS8.length){
    Z$("zmvps8Table").innerHTML = '<div class="zempty">No Season 8 data found.</div>';
    return;
  }
  if(!rows.length){
    Z$("zmvps8Table").innerHTML = head + '<div class="zempty">No players match your search.</div>';
    return;
  }
  Z$("zmvps8Table").innerHTML = head + rows.map((p,i) => `
    <div class="zrow">
      <span class="zrrank">${ZrowHex(i+1)}</span>
      <span class="zrplayer"><b>${Zesc(p.name)}</b>${p.team ? `<span class="zrteam">${Zesc(p.team)}</span>` : ""}</span>
      <span class="zrcell">${p.top1 ? ZpillsHTML(p.top1) : '<span class="zpill znil">—</span>'}</span>
      <span class="zrcell">${p.top5 ? ZpillsHTML(p.top5) : '<span class="zpill znil">—</span>'}</span>
      <span class="zrcell">${p.potw ? ZpillsHTML(p.potw) : '<span class="zpill znil">—</span>'}</span>
      <span class="zrcell">${p.mvps ? ZpillsHTML(p.mvps) : '<span class="zpill znil">—</span>'}</span>
      <span class="zrtotal">${p.points}</span>
    </div>`).join("");
}
function ZrenderAll(){
  Z$("ztotal").textContent = ZMVPS8.length;
  ZrenderMvps8();
}

Z$("zsearch").addEventListener("input",ZrenderAll);
Zsync();
setInterval(Zsync,60000);
</script>
